name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:


  test-e2e:
    name: 🌐 E2E Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: npx playwright test --project=sd-e2e --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: true
          PLAYWRIGHT_SKIP_BROWSER_GC: 1

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 1

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-shard-${{ matrix.shardIndex }}
          path: allure-results/
          retention-days: 1

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts-shard-${{ matrix.shardIndex }}
          path: test-results/
          retention-days: 7


  test-api:
    name: 🔌 API Tests (jsonplaceholder)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:api
        env:
          CI: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 1


  merge-reports:
    name: 📊 Merge E2E Reports
    runs-on: ubuntu-latest
    needs: test-e2e
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports/
          merge-multiple: true

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-e2e
          path: playwright-report/
          retention-days: 14

          
  publish-allure:
    name: 📈 Publish Allure Report
    runs-on: ubuntu-latest
    needs: [test-e2e, test-api]
    if: always()

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download E2E Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          path: allure-results/
          merge-multiple: true

      - name: Download API Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.30.0/allure-2.30.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.30.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  notify-telegram:
    name: 📬 Telegram Notification
    runs-on: ubuntu-latest
    needs: [test-e2e, test-api, publish-allure]
    if: always()   # отправляем даже если тесты упали

    steps:
      - name: Send Telegram message
        run: |
          # Определяем итоговый статус — берём статус обоих тестовых job
          E2E_STATUS="${{ needs.test-e2e.result }}"
          API_STATUS="${{ needs.test-api.result }}"

          if [[ "$E2E_STATUS" == "success" && "$API_STATUS" == "success" ]]; then
            STATUS_ICON="✅"
            STATUS_TEXT="All tests passed"
          elif [[ "$E2E_STATUS" == "cancelled" || "$API_STATUS" == "cancelled" ]]; then
            STATUS_ICON="⚠️"
            STATUS_TEXT="Run was cancelled"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="Tests failed"
          fi

          # Ссылка на Allure репорт на GitHub Pages
          ALLURE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

          # Ссылка на этот прогон в GitHub Actions
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Ветка или PR
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TRIGGER="PR #${{ github.event.number }}: ${{ github.event.pull_request.title }}"
          else
            TRIGGER="Push to ${{ github.ref_name }}"
          fi

          # Формируем текст сообщения (Markdown для Telegram)
          MESSAGE="${STATUS_ICON} *Playwright Tests* ${STATUS_ICON}

          *Status:* ${STATUS_TEXT}
          *Trigger:* ${TRIGGER}
          *Commit:* \`${{ github.sha }}\`

          🧪 E2E: ${E2E_STATUS}
          🔌 API: ${API_STATUS}

          📊 [Allure Report](${ALLURE_URL})
          🔍 [GitHub Actions Run](${RUN_URL})"

          # Отправляем через Telegram Bot API
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\",
              \"text\": $(echo "$MESSAGE" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"parse_mode\": \"Markdown\",
              \"disable_web_page_preview\": false
            }"